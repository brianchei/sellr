name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: sellr_test
          POSTGRES_USER: sellr
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations against test DB
        run: pnpm --filter @sellr/api prisma migrate deploy
        env:
          DATABASE_URL: postgresql://sellr:test_password@localhost:5432/sellr_test
          DIRECT_URL: postgresql://sellr:test_password@localhost:5432/sellr_test

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint all packages
        run: pnpm lint

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://sellr:test_password@localhost:5432/sellr_test
          DIRECT_URL: postgresql://sellr:test_password@localhost:5432/sellr_test
          REDIS_URL: redis://localhost:6379
